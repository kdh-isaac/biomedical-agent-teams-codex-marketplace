name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install ".[dev]"

      - name: Verify tag matches package version (fail-closed)
        id: version_check
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          VERSION_FILE=$(cat plugins/biomedical-agent-teams/skills/biomedical-agent-teams/VERSION | tr -d '[:space:]')
          PLUGIN_JSON=$(python -c "import json; print(json.load(open('plugins/biomedical-agent-teams/.codex-plugin/plugin.json'))['version'])")
          MANIFEST_JSON=$(python -c "import json; print(json.load(open('plugins/biomedical-agent-teams/skills/biomedical-agent-teams/manifest.json'))['version'])")
          echo "tag=$TAG version_file=$VERSION_FILE plugin_json=$PLUGIN_JSON manifest_json=$MANIFEST_JSON"
          if [ "$TAG" != "$VERSION_FILE" ] || [ "$TAG" != "$PLUGIN_JSON" ] || [ "$TAG" != "$MANIFEST_JSON" ]; then
            echo "::error::Tag v$TAG does not match package version across VERSION/plugin.json/manifest.json. Refusing to release."
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Package check
        run: python plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_package_check.py --root plugins/biomedical-agent-teams

      - name: Self-test (dependency-free smoke)
        run: python plugins/biomedical-agent-teams/skills/biomedical-agent-teams/scripts/bmat_selftest.py --root plugins/biomedical-agent-teams

      - name: Pytest
        run: python -m pytest -q

      - name: Golden eval schema
        run: python plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/validate_golden_eval_schema.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl

      - name: Golden eval gate
        run: python plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/run_golden_eval.py --tasks plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/golden_tasks.jsonl --outputs plugins/biomedical-agent-teams/skills/biomedical-agent-teams/evals/sample_outputs.jsonl --strict --gate

      - name: Write release manifest
        run: |
          python - <<'PY'
          import json, os, subprocess

          version = os.environ["RELEASE_VERSION"]
          sha = subprocess.check_output(["git", "rev-parse", "HEAD"]).decode().strip()
          manifest = {
              "version": version,
              "tag": f"v{version}",
              "commit_sha": sha,
              "gates_passed": [
                  "bmat_package_check",
                  "bmat_selftest",
                  "pytest",
                  "validate_golden_eval_schema",
                  "run_golden_eval --strict --gate",
              ],
              "benchmark_status": "not_run",
          }
          with open("release-manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          print(json.dumps(manifest, indent=2))
          PY
        env:
          RELEASE_VERSION: ${{ steps.version_check.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-manifest.json
