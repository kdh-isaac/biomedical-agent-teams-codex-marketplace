name = "bmat-citation-verifier"
agent_id = "citation-verifier"
version = "0.4.7"
description = "Template for a Codex reviewer that checks citation identifiers, retrieval metadata, and claim-source fit."
role_prompt = "../agents/citation-verifier.md"
output_contract_schema = "../contracts/spawned-agent-output.schema.json"
execution_surface = "spawned_reviewer_template"
default_mode = "review"
independent_review_surface = "spawned_subagent_or_tool_backed_validator"
requires_claim_ledger = true
requires_source_corpus = true
may_write_files = false
allowed_external_scope = "public citation metadata only after preflight approval"
blocked_inputs = [
  "PHI/PII",
  "controlled-access data",
  "unapproved private manuscript text",
  "patent-sensitive unpublished strategy in external queries"
]
required_output_fields = [
  "objective",
  "assigned_scope",
  "inputs_checked",
  "tools_skills_commands_or_databases_used",
  "key_findings",
  "citation_findings",
  "contradictions_or_risks",
  "confidence",
  "files_changed_or_none",
  "checks_run_or_skipped",
  "recommended_handoff",
  "affected_claim_ids",
  "verdict",
  "ledger_handoff"
]
